<!DOCTYPE html>
<html>
<head><title>WorkX - Authentication Complete</title>
<style>
body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
       display: flex; justify-content: center; align-items: center;
       min-height: 100vh; margin: 0; background: #1a1a2e; color: #e0e0e0; }
.container { text-align: center; padding: 2rem; }
h1 { color: #4ade80; margin-bottom: 0.5rem; }
p { color: #a0a0b0; }
</style>
</head>
<body>
<div class="container">
  <h1>Authentication Successful</h1>
  <p>You can close this tab and return to WorkX.</p>
</div>
<script>
(function () {
  var params = new URLSearchParams(window.location.search);
  var code = params.get('code');
  var state = params.get('state');
  if (code && state) {
    chrome.runtime.sendMessage({ type: 'OAUTH_CALLBACK', code: code, state: state });
  }
  setTimeout(function () { window.close(); }, 1500);
})();
</script>
</body>
</html>
