<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Authentication Complete</title>
  <!--
    Reference callback page for Apple Pi web UI OAuth flow.

    This page is served by airepublic.com at /auth/web/callback.
    After Google OAuth completes, the backend redirects here with tokens
    in query params. This page sends them to the opener (web UI) via
    postMessage and closes itself.

    To deploy: host this page at https://airepublic.com/auth/web/callback
  -->
  <style>
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      margin: 0;
      background: #0a0a0a;
      color: #e5e5e5;
    }
    .container { text-align: center; padding: 2rem; }
    .spinner {
      width: 32px; height: 32px;
      border: 3px solid #333;
      border-top-color: #60a5fa;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
      margin: 0 auto 1rem;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    .error { color: #f87171; }
  </style>
</head>
<body>
  <div class="container">
    <div class="spinner" id="spinner"></div>
    <p id="status">Completing authentication...</p>
  </div>
  <script>
    (function() {
      var params = new URLSearchParams(window.location.search);
      var accessToken = params.get('access_token');
      var refreshToken = params.get('refresh_token');
      var error = params.get('error');

      var statusEl = document.getElementById('status');
      var spinnerEl = document.getElementById('spinner');

      if (error || !accessToken || !refreshToken) {
        spinnerEl.style.display = 'none';
        statusEl.className = 'error';
        statusEl.textContent = error || 'Authentication failed — missing tokens.';
        return;
      }

      if (window.opener) {
        // Send tokens to the web UI that opened this popup
        window.opener.postMessage({
          type: 'auth-callback',
          access_token: accessToken,
          refresh_token: refreshToken,
        }, '*');

        statusEl.textContent = 'Authenticated! This window will close...';
        setTimeout(function() { window.close(); }, 1000);
      } else {
        spinnerEl.style.display = 'none';
        statusEl.textContent = 'Authentication successful. You can close this window.';
      }
    })();
  </script>
</body>
</html>
