services:
  workx-server:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "18100:18100"
    volumes:
      - workx-data:/data
      - ./config.json:/app/config.json:ro
    environment:
      - WORKX_SERVER_PORT=18100
      - WORKX_SERVER_BIND=auto
      # Web UI connects from the server's own origin; `none` mode accepts
      # loopback + same-origin browser connections (see buildExpectedOrigins
      # in src/server/connection/auth.ts). Use `token` for network-exposed
      # deployments without the browser UI.
      - WORKX_SERVER_AUTH_MODE=${WORKX_SERVER_AUTH_MODE:-none}
      - WORKX_SERVER_TOKEN=${WORKX_SERVER_TOKEN}
      - WORKX_DATA_DIR=/data
      - WORKX_CONFIG_PATH=/app/config.json
      - NODE_ENV=production
      # Required for credential encryption (API key storage)
      # Generate: node -e "console.log(require('crypto').randomBytes(32).toString('base64'))"
      - VITE_VAULT_SECRET=${VITE_VAULT_SECRET}
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://localhost:18100/health').then(r=>r.ok?process.exit(0):process.exit(1)).catch(()=>process.exit(1))"]
      interval: 60s
      timeout: 5s
      retries: 3
      start_period: 30s

volumes:
  workx-data:
