version: '3.8'

services:
  applepi-server:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "18100:18100"
    volumes:
      - applepi-data:/data
      - ./config.json:/app/config.json:ro
    environment:
      - APPLEPI_SERVER_PORT=18100
      - APPLEPI_SERVER_BIND=auto
      - APPLEPI_SERVER_AUTH_MODE=token
      - APPLEPI_SERVER_TOKEN=${APPLEPI_SERVER_TOKEN}
      - APPLEPI_DATA_DIR=/data
      - APPLEPI_CONFIG_PATH=/app/config.json
      - NODE_ENV=production
      # Required for credential encryption (API key storage)
      # Generate: node -e "console.log(require('crypto').randomBytes(32).toString('base64'))"
      - VITE_VAULT_SECRET=${VITE_VAULT_SECRET}
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://localhost:18100/health').then(r=>r.ok?process.exit(0):process.exit(1)).catch(()=>process.exit(1))"]
      interval: 60s
      timeout: 5s
      retries: 3
      start_period: 30s

volumes:
  applepi-data:
