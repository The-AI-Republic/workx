name: Sync to private repo

on:
  push:
    branches:
      - main

jobs:
  sync:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    concurrency:
      group: sync-to-private-repo
      cancel-in-progress: false

    steps:
      - name: Checkout public repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Debug - Check secret availability
        run: |
          if [ -z "${{ secrets.OSS_SYNC_TO_PRIVATE }}" ]; then
            echo "❌ ERROR: OSS_SYNC_TO_PRIVATE secret is empty or not set!"
            echo "Secret length: 0"
            exit 1
          else
            echo "✅ OSS_SYNC_TO_PRIVATE secret is available"
            echo "Secret length: ${#OSS_SYNC_TO_PRIVATE}"
          fi
        env:
          OSS_SYNC_TO_PRIVATE: ${{ secrets.OSS_SYNC_TO_PRIVATE }}

      - name: Clone private repo
        run: |
          set -e
          set -o pipefail

          echo "Cloning private repository..."
          if ! git clone \
            https://x-access-token:${{ secrets.OSS_SYNC_TO_PRIVATE }}@github.com/The-AI-Republic/private-pi.git \
            private-repo; then
            echo "ERROR: Failed to clone private repository" >&2
            echo "Check that OSS_SYNC_TO_PRIVATE secret is set and valid" >&2
            exit 1
          fi

          cd private-repo
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          echo "Git identity configured as github-actions[bot]"

      - name: Sync files with directory remapping
        run: |
          set -e
          set -o pipefail

          PUBLIC_SRC_DIR="."
          PRIVATE_TARGET_DIR="open_source"
          MAPPING_FILE="open_source_mapping.json"

          echo "Syncing files from public repo to private repo..."
          echo "Source: $PUBLIC_SRC_DIR"
          echo "Target: $PRIVATE_TARGET_DIR"

          # Read mapping configuration from private repo
          if [ -f "private-repo/$MAPPING_FILE" ]; then
            echo "Found mapping configuration at private-repo/$MAPPING_FILE"

            # Parse exclude patterns from JSON
            EXCLUDE_PATTERNS=$(jq -r '.exclude[]? // empty' "private-repo/$MAPPING_FILE")

            # Parse file renames from JSON (array of [original, target] pairs)
            RENAMES=$(jq -r '.rename[]? // empty | "\(.[0]):\(.[1])"' "private-repo/$MAPPING_FILE")

            echo "Exclude patterns:"
            echo "$EXCLUDE_PATTERNS"
            echo ""
            echo "File renames:"
            echo "$RENAMES"
          else
            echo "No mapping file found, using default excludes only"
            EXCLUDE_PATTERNS=""
            RENAMES=""
          fi

          # Create and clean target directory
          cd private-repo
          mkdir -p "$PRIVATE_TARGET_DIR"
          find "$PRIVATE_TARGET_DIR" -mindepth 1 -maxdepth 999 -print0 | xargs -0 rm -rf 2>/dev/null || true

          # Build rsync exclude arguments
          cd ..
          RSYNC_EXCLUDES="--exclude .git --exclude .github --exclude node_modules --exclude .gitignore --exclude private-repo"

          # Add custom excludes from mapping file
          if [ -n "$EXCLUDE_PATTERNS" ]; then
            while IFS= read -r pattern; do
              if [ -n "$pattern" ]; then
                RSYNC_EXCLUDES="$RSYNC_EXCLUDES --exclude $pattern"
              fi
            done <<< "$EXCLUDE_PATTERNS"
          fi

          # Sync files from public to private
          echo "Running rsync with excludes: $RSYNC_EXCLUDES"
          if ! rsync -av \
            --delete \
            $RSYNC_EXCLUDES \
            "$PUBLIC_SRC_DIR"/ \
            "private-repo/$PRIVATE_TARGET_DIR"/; then
            echo "ERROR: rsync failed - check disk space and permissions" >&2
            exit 1
          fi

          # Handle file renames
          if [ -n "$RENAMES" ]; then
            echo "Processing file renames..."
            cd private-repo/$PRIVATE_TARGET_DIR
            while IFS=: read -r from to; do
              if [ -n "$from" ] && [ -n "$to" ]; then
                if [ -e "$from" ]; then
                  echo "Renaming: $from -> $to"
                  mkdir -p "$(dirname "$to")"
                  mv "$from" "$to"
                else
                  echo "Warning: Source file not found for rename: $from"
                fi
              fi
            done <<< "$RENAMES"
            cd ../..
          fi

          echo "File sync completed successfully"

      - name: Commit and push to private repo
        run: |
          set -e
          set -o pipefail

          cd private-repo

          # Check if there are any changes
          if [ -z "$(git status --porcelain)" ]; then
            echo "ℹ️ No changes to sync - repository is already up to date"
            exit 0
          fi

          echo "Changes detected - creating commit..."

          # Commit and push changes
          git add .
          git commit -m "Sync from public main: ${GITHUB_SHA}"

          echo "Pushing changes to private repository..."
          if ! git push origin main; then
            echo "ERROR: Failed to push to private repository" >&2
            echo "Check branch protection rules or network connectivity" >&2
            exit 1
          fi

          echo "✅ Sync completed successfully"
