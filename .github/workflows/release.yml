name: Release

on:
  release:
    types: [created]

env:
  CARGO_TERM_COLOR: always

jobs:
  build-extension:
    name: Chrome Extension
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: write
      pull-requests: write

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Extract version from tag
        id: version
        run: |
          TAG="${GITHUB_REF#refs/tags/v}"
          echo "version=$TAG" >> "$GITHUB_OUTPUT"
          echo "Building version: $TAG"

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - run: npm ci

      - name: Sync version into config files
        run: node scripts/sync-version.js ${{ steps.version.outputs.version }}

      - name: Create extension .env
        run: |
          cat > src/extension/.env << EOF
          VITE_AUTH_COOKIE_DOMAIN=${{ vars.VITE_AUTH_COOKIE_DOMAIN }}
          VITE_AUTH_BASE_URL=${{ vars.VITE_AUTH_BASE_URL }}
          VITE_BACKEND_API_BASE_URL=${{ vars.VITE_BACKEND_API_BASE_URL }}
          VITE_VAULT_SECRET=${{ secrets.VITE_VAULT_SECRET }}
          EOF

      - name: Build extension
        run: npm run build

      - name: Verify build output
        run: |
          if [ ! -d "dist" ] || [ ! -f "dist/manifest.json" ]; then
            echo "Error: build output missing"
            exit 1
          fi

      - name: Zip extension
        run: cd dist && zip -r ../browserx.zip ./*

      - name: Upload browserx.zip to release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release upload "${{ github.event.release.tag_name }}" \
            browserx.zip \
            --clobber

      - name: Create Chrome Web Store review PR
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          BRANCH="chrome-release-${VERSION}"
          TAG="${{ github.event.release.tag_name }}"

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          git checkout -b "$BRANCH"
          git add manifest.json
          git commit -m "chore: bump chrome extension version to ${VERSION}"
          git push origin "$BRANCH"

          cat > /tmp/pr-body.md <<EOF
          ## Chrome Extension Release v${VERSION}

          Auto-generated by the release workflow for tag \`${TAG}\`.

          ### What this PR contains
          - Updates manifest.json version to \`${VERSION}\`

          ### What happens when this PR is merged
          The **publish-chrome** workflow will automatically:
          1. Download \`browserx.zip\` from the GitHub Release
          2. Upload it to the Chrome Web Store
          3. Publish the extension

          ### To complete the release
          1. Review the changes
          2. Approve and merge this PR
          EOF

          gh pr create \
            --title "chore: publish Chrome extension v${VERSION}" \
            --body-file /tmp/pr-body.md \
            --base main \
            --head "$BRANCH"

  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: macOS-universal
            runner: macos-latest
            args: --target universal-apple-darwin
          - name: Windows-x64
            runner: windows-latest
            args: --target x86_64-pc-windows-msvc
          - name: Linux-x64
            runner: ubuntu-22.04
            args: --target x86_64-unknown-linux-gnu

    name: ${{ matrix.name }}
    runs-on: ${{ matrix.runner }}
    timeout-minutes: 60
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Extract version from tag
        id: version
        shell: bash
        run: |
          TAG="${GITHUB_REF#refs/tags/v}"
          echo "version=$TAG" >> "$GITHUB_OUTPUT"
          echo "Building version: $TAG"

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - run: npm ci

      - name: Sync version into config files
        run: node scripts/sync-version.js ${{ steps.version.outputs.version }}

      - name: Create desktop .env
        shell: bash
        run: |
          cat > src/desktop/.env << 'EOF'
          VITE_AUTH_COOKIE_DOMAIN=${{ vars.VITE_AUTH_COOKIE_DOMAIN }}
          VITE_AUTH_BASE_URL=${{ vars.VITE_AUTH_BASE_URL }}
          VITE_BACKEND_API_BASE_URL=${{ vars.VITE_BACKEND_API_BASE_URL }}
          EOF

      - name: Setup Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ contains(matrix.args, 'universal-apple-darwin') && 'aarch64-apple-darwin,x86_64-apple-darwin' || '' }}

      - name: Cache Rust dependencies
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            tauri/target
          key: ${{ matrix.runner }}-cargo-${{ hashFiles('tauri/Cargo.lock') }}
          restore-keys: |
            ${{ matrix.runner }}-cargo-

      - name: Install Linux system dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            librsvg2-dev \
            patchelf \
            libssl-dev \
            libgtk-3-dev \
            libayatana-appindicator3-dev

      - name: Install tauri-cli
        run: cargo install tauri-cli --version "^2" --locked

      - name: Build and upload with tauri-action
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ github.token }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        with:
          projectPath: tauri
          tauriScript: cargo tauri
          args: ${{ matrix.args }}
          tagName: ${{ github.event.release.tag_name }}
          releaseName: ${{ github.event.release.name }}
          releaseId: ${{ github.event.release.id }}
