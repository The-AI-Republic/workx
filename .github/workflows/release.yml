name: Release (Chrome extension)

# Publishing a GitHub Release builds the Chrome extension, attaches workx.zip to
# the Release, and opens the Chrome Web Store publish PR.
#
# The desktop app is NOT built here anymore — it moved to release-desktop.yml,
# which builds/signs and pushes to the workx-desktop-releases S3 bucket that the
# in-app auto-updater reads. Both workflows fire on the same `release: released`
# event, so one GitHub Release ships both surfaces; desktop builds once, to S3.

on:
  # `released` fires only on publishing a non-prerelease Release (including a
  # draft that is later published) — matches release-desktop.yml so both
  # surfaces ship together and prereleases/drafts never auto-publish.
  release:
    types: [released]

jobs:
  build-extension:
    name: Chrome Extension
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: write
      pull-requests: write

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Extract version from tag
        id: version
        run: |
          TAG="${GITHUB_REF#refs/tags/v}"
          echo "version=$TAG" >> "$GITHUB_OUTPUT"
          echo "Building version: $TAG"

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - run: npm ci

      - name: Sync version into config files
        run: node scripts/sync-version.js ${{ steps.version.outputs.version }}

      - name: Create extension .env
        run: |
          cat > src/extension/.env << EOF
          VITE_AUTH_COOKIE_DOMAIN=${{ vars.VITE_AUTH_COOKIE_DOMAIN }}
          VITE_AUTH_BASE_URL=${{ vars.VITE_AUTH_BASE_URL }}
          VITE_BACKEND_API_BASE_URL=${{ vars.VITE_BACKEND_API_BASE_URL }}
          VITE_VAULT_SECRET=${{ secrets.VITE_VAULT_SECRET }}
          EOF

      - name: Build extension
        run: npm run build

      - name: Verify build output
        run: |
          if [ ! -d "dist" ] || [ ! -f "dist/manifest.json" ]; then
            echo "Error: build output missing"
            exit 1
          fi

      - name: Zip extension
        run: cd dist && zip -r ../workx.zip ./*

      - name: Upload workx.zip to release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release upload "${{ github.event.release.tag_name }}" \
            workx.zip \
            --clobber

      - name: Create Chrome Web Store review PR
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          BRANCH="chrome-release-${VERSION}"
          TAG="${{ github.event.release.tag_name }}"

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          git checkout -b "$BRANCH"
          git add manifest.json
          git commit -m "chore: bump chrome extension version to ${VERSION}"
          git push origin "$BRANCH"

          cat > /tmp/pr-body.md <<EOF
          ## Chrome Extension Release v${VERSION}

          Auto-generated by the release workflow for tag \`${TAG}\`.

          ### What this PR contains
          - Updates manifest.json version to \`${VERSION}\`

          ### What happens when this PR is merged
          The **publish-chrome** workflow will automatically:
          1. Download \`workx.zip\` from the GitHub Release
          2. Upload it to the Chrome Web Store
          3. Publish the extension

          ### To complete the release
          1. Review the changes
          2. Approve and merge this PR
          EOF

          gh pr create \
            --title "chore: publish Chrome extension v${VERSION}" \
            --body-file /tmp/pr-body.md \
            --base main \
            --head "$BRANCH"
