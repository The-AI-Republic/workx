# Streaming Event Conversion Contracts

# This document defines the formal contracts for converting Chat Completions API
# chunks (used by Gemini) to ResponseEvent objects (expected by TurnManager).
#
# Contracts specify:
# - Input schemas (ChatCompletionChunk structure from OpenAI SDK)
# - Output schemas (ResponseEvent types from BrowserX protocol)
# - Conversion rules and conditional logic
# - Accumulation and emission timing

version: "1.0"
provider: "Chat Completions API (Gemini, xAI)"
implementation: "/home/irichard/dev/git_repos/open_source/browserx/s4/browserx/src/models/OpenAIResponsesClient.ts"
method: "convertChatCompletionEventToResponseEvent"
lines: "639-759"

# ==============================================================================
# SECTION 1: Text Delta Handling
# ==============================================================================

text_delta_contract:
  description: |
    Handles streaming text content from Chat Completions API.

    Unlike Responses API which provides complete message items via
    output_item.done events, Chat Completions streams text as deltas
    requiring client-side accumulation.

  input:
    type: "ChatCompletionChunk"
    schema:
      id:
        type: "string"
        example: "chatcmpl_123"
        description: "Unique identifier for this completion"

      choices:
        type: "array"
        minItems: 1
        maxItems: 1
        items:
          type: "object"
          properties:
            index:
              type: "number"
              value: 0
              description: "Choice index (always 0 for single choice)"

            delta:
              type: "object"
              properties:
                content:
                  type: "string"
                  description: "Text delta to append"
                  example: "Hello"
                  nullable: true

                role:
                  type: "string"
                  enum: ["assistant"]
                  description: "Role of the responder (only in first chunk)"
                  nullable: true

            finish_reason:
              type: "null"
              description: "Must be null for delta chunks"

      usage:
        type: "null"
        description: "Not present in delta chunks"

    examples:
      - description: "First chunk with role"
        value:
          id: "chatcmpl_123"
          choices:
            - index: 0
              delta:
                role: "assistant"
                content: "Hello"
              finish_reason: null

      - description: "Subsequent delta chunk"
        value:
          id: "chatcmpl_123"
          choices:
            - index: 0
              delta:
                content: " there!"
              finish_reason: null

      - description: "Empty delta (rare)"
        value:
          id: "chatcmpl_123"
          choices:
            - index: 0
              delta: {}
              finish_reason: null

  output:
    immediate_event:
      type: "OutputTextDelta"
      schema:
        type:
          const: "OutputTextDelta"
        delta:
          type: "string"
          description: "The text delta from input.choices[0].delta.content"
          example: "Hello"

      condition: "input.choices[0].delta.content !== null && input.choices[0].delta.content !== undefined"

      examples:
        - description: "Text delta event"
          value:
            type: "OutputTextDelta"
            delta: "Hello"

    accumulated_state:
      variable: "this.chatCompletionTextContent"
      type: "string"
      operation: "append"
      formula: "this.chatCompletionTextContent += delta.content"

      lifecycle:
        - event: "stream_start"
          action: "this.chatCompletionTextContent = ''"

        - event: "delta_received"
          action: "this.chatCompletionTextContent += delta.content"

        - event: "finish_reason_received"
          action: "Use accumulated text to create message item"

        - event: "message_item_created"
          action: "this.chatCompletionTextContent = ''"

    no_event_emitted:
      condition: "delta.content === null || delta.content === undefined"
      return: "null"

  conversion_rules:
    - rule: "Emit OutputTextDelta for every non-null delta.content"
      code_location: "lines 662-667"

    - rule: "Accumulate ALL delta.content values in chatCompletionTextContent"
      code_location: "lines 664 (new)"

    - rule: "Do NOT emit OutputItemDone during delta streaming"
      rationale: "Message item created only on finish_reason"

    - rule: "Empty or missing delta.content returns null (no event)"
      code_location: "line 668"

  error_handling:
    - condition: "delta.content is not a string"
      action: "Log warning, skip accumulation, return null"

    - condition: "chatCompletionTextContent exceeds reasonable length (>100KB)"
      action: "Log warning, continue accumulation (don't truncate)"

# ==============================================================================
# SECTION 2: Tool Call Handling
# ==============================================================================

tool_call_contract:
  description: |
    Handles streaming tool call deltas from Chat Completions API.

    Tool calls arrive as incremental updates indexed by position.
    Each delta may update id, name, or append to arguments string.

    No events are emitted during accumulation. OutputItemDone is emitted
    only when finish_reason === 'tool_calls'.

  input:
    type: "ChatCompletionChunk"
    schema:
      id:
        type: "string"
        example: "chatcmpl_456"

      choices:
        type: "array"
        items:
          type: "object"
          properties:
            delta:
              type: "object"
              properties:
                tool_calls:
                  type: "array"
                  description: "Array of tool call deltas"
                  items:
                    type: "object"
                    properties:
                      index:
                        type: "number"
                        description: "Tool call index (for incremental updates)"
                        example: 0

                      id:
                        type: "string"
                        description: "Tool call ID (present in first chunk only)"
                        example: "call_abc123"
                        nullable: true

                      type:
                        type: "string"
                        enum: ["function"]
                        description: "Tool call type (present in first chunk only)"
                        nullable: true

                      function:
                        type: "object"
                        properties:
                          name:
                            type: "string"
                            description: "Function name (present in first chunk only)"
                            example: "web_search"
                            nullable: true

                          arguments:
                            type: "string"
                            description: "JSON arguments delta to append"
                            example: '{"query":'
                            nullable: true

            finish_reason:
              type: "null"
              description: "Null during accumulation"

    examples:
      - description: "First tool call chunk (with id, type, name)"
        value:
          id: "chatcmpl_456"
          choices:
            - index: 0
              delta:
                tool_calls:
                  - index: 0
                    id: "call_abc123"
                    type: "function"
                    function:
                      name: "web_search"
                      arguments: ""
              finish_reason: null

      - description: "Subsequent argument chunk"
        value:
          id: "chatcmpl_456"
          choices:
            - index: 0
              delta:
                tool_calls:
                  - index: 0
                    function:
                      arguments: '{"query":'
              finish_reason: null

      - description: "Final argument chunk"
        value:
          id: "chatcmpl_456"
          choices:
            - index: 0
              delta:
                tool_calls:
                  - index: 0
                    function:
                      arguments: ' "test"}'
              finish_reason: null

  output:
    immediate_event:
      type: "null"
      description: "No event emitted during tool call accumulation"
      condition: "delta.tool_calls is present"
      return: "null"

    accumulated_state:
      variable: "this.chatCompletionToolCalls"
      type: "Map<number, ToolCallObject>"
      operation: "incremental_update"

      structure:
        key: "tool_call.index (number)"
        value:
          type: "object"
          properties:
            id:
              type: "string"
              source: "First chunk with index=N"
            type:
              type: "string"
              source: "First chunk with index=N"
            function:
              type: "object"
              properties:
                name:
                  type: "string"
                  source: "First chunk with index=N"
                arguments:
                  type: "string"
                  source: "Concatenation of all argument deltas for index=N"

      lifecycle:
        - event: "stream_start"
          action: "this.chatCompletionToolCalls.clear()"

        - event: "delta_received"
          action: "Update map entry by index (create or append)"

        - event: "finish_reason === 'tool_calls'"
          action: "Convert map to array, emit OutputItemDone, clear map"

        - event: "finish_reason !== 'tool_calls'"
          action: "Discard accumulated tool calls, clear map"

  conversion_rules:
    - rule: "For each tool_call delta in array, update map by index"
      code_location: "lines 670-703"
      logic: |
        for each toolCallDelta in delta.tool_calls:
          index = toolCallDelta.index
          existing = map.get(index)

          if not existing:
            map.set(index, {
              id: toolCallDelta.id || '',
              type: toolCallDelta.type || 'function',
              function: {
                name: toolCallDelta.function?.name || '',
                arguments: toolCallDelta.function?.arguments || ''
              }
            })
          else:
            if toolCallDelta.id: existing.id = toolCallDelta.id
            if toolCallDelta.type: existing.type = toolCallDelta.type
            if toolCallDelta.function?.name: existing.function.name = toolCallDelta.function.name
            if toolCallDelta.function?.arguments: existing.function.arguments += toolCallDelta.function.arguments
            map.set(index, existing)

    - rule: "Return null (no event) after accumulating tool call deltas"
      code_location: "line 704"

    - rule: "Do NOT emit events until finish_reason arrives"
      rationale: "Tool call must be complete before creating function_call item"

  error_handling:
    - condition: "Missing index in tool_call delta"
      action: "Log error, skip this tool call delta"

    - condition: "function.arguments is not a string"
      action: "Convert to string or use empty string"

    - condition: "Multiple tool calls (map.size > 1) on completion"
      action: "Log warning, emit only first tool call, discard rest"

# ==============================================================================
# SECTION 3: Completion Handling - Text Response
# ==============================================================================

completion_text_contract:
  description: |
    Handles completion of text-only responses.

    When finish_reason arrives with accumulated text content, create a
    message item containing the complete text, emit OutputItemDone, then
    queue Completed for next iteration.

  input:
    type: "ChatCompletionChunk"
    schema:
      id:
        type: "string"
        example: "chatcmpl_123"

      choices:
        type: "array"
        items:
          type: "object"
          properties:
            delta:
              type: "object"
              description: "Usually empty for completion chunk"
              properties: {}

            finish_reason:
              type: "string"
              enum: ["stop", "length"]
              description: "Completion reason for text responses"

      usage:
        type: "object"
        description: "Token usage statistics"
        properties:
          prompt_tokens:
            type: "number"
          completion_tokens:
            type: "number"
          total_tokens:
            type: "number"

    examples:
      - description: "Normal completion (stop)"
        value:
          id: "chatcmpl_123"
          choices:
            - index: 0
              delta: {}
              finish_reason: "stop"
          usage:
            prompt_tokens: 10
            completion_tokens: 5
            total_tokens: 15

      - description: "Length limit completion"
        value:
          id: "chatcmpl_123"
          choices:
            - index: 0
              delta: {}
              finish_reason: "length"
          usage:
            prompt_tokens: 10
            completion_tokens: 100
            total_tokens: 110

  preconditions:
    - condition: "this.chatCompletionTextContent.length > 0"
      description: "Text content must be accumulated from previous deltas"

    - condition: "finish_reason === 'stop' || finish_reason === 'length'"
      description: "Completion reason indicates text response"

  output:
    immediate_event:
      type: "OutputItemDone"
      schema:
        type:
          const: "OutputItemDone"
        item:
          type: "ResponseItem (message)"
          properties:
            type:
              const: "message"
            role:
              const: "assistant"
            content:
              type: "array"
              items:
                type: "object"
                properties:
                  type:
                    const: "output_text"
                  text:
                    type: "string"
                    description: "Accumulated text from chatCompletionTextContent"

      example:
        type: "OutputItemDone"
        item:
          type: "message"
          role: "assistant"
          content:
            - type: "output_text"
              text: "Hello there! How can I help you today?"

    queued_event:
      type: "Completed"
      schema:
        type:
          const: "Completed"
        responseId:
          type: "string"
          description: "From input.id"
        tokenUsage:
          type: "object"
          properties:
            inputTokens:
              type: "number"
              source: "input.usage.prompt_tokens"
            outputTokens:
              type: "number"
              source: "input.usage.completion_tokens"

      queue: "this.pendingEvents"
      emission_timing: "Next iteration or stream end flush"

      example:
        type: "Completed"
        responseId: "chatcmpl_123"
        tokenUsage:
          inputTokens: 10
          outputTokens: 5

    state_changes:
      - variable: "this.chatCompletionTextContent"
        action: "Reset to empty string"
        timing: "After creating message item"

      - variable: "this.chatCompletionToolCalls"
        action: "Clear map"
        timing: "After creating message item"
        rationale: "Defensive cleanup (should already be empty)"

      - variable: "this.pendingEvents"
        action: "Push Completed event"
        timing: "After emitting OutputItemDone"

  conversion_rules:
    - rule: "Create message item with accumulated text"
      code_location: "lines 423-446 (new)"
      logic: |
        const messageText = this.chatCompletionTextContent;

        const messageItem: ResponseItem = {
          type: 'message',
          role: 'assistant',
          content: [{
            type: 'output_text',
            text: messageText,
          }],
        };

    - rule: "Emit OutputItemDone with message item"
      code_location: "lines 436-446 (new)"

    - rule: "Queue Completed event for next iteration"
      code_location: "lines 432 (new)"
      logic: "this.pendingEvents.push(completedEvent);"

    - rule: "Clear accumulated state after emission"
      code_location: "lines 425, 430 (new)"
      logic: |
        this.chatCompletionTextContent = '';
        this.chatCompletionToolCalls.clear();

    - rule: "Return OutputItemDone immediately (Completed emitted next)"
      code_location: "lines 436-446 (new)"

  error_handling:
    - condition: "chatCompletionTextContent is empty"
      action: "Log warning, skip OutputItemDone, emit Completed directly"
      code_location: "lines 423 (new)"

    - condition: "Message item creation fails"
      action: "Log error, emit Completed without OutputItemDone"

    - condition: "Usage data missing"
      action: "Create Completed event with undefined tokenUsage"

  event_sequence:
    description: "Order of events emitted to TurnManager"
    sequence:
      - event: "OutputItemDone"
        timing: "Immediate return from convertChatCompletionEventToResponseEvent"
        contains: "Message item with accumulated text"

      - event: "Completed"
        timing: "Next iteration (from pendingEvents queue)"
        contains: "Response ID and token usage"

