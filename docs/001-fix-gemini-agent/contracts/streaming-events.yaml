edge_cases:
  no_content_or_tools:
    description: "finish_reason arrives but no text or tool calls accumulated"

    input_example:
      id: "chatcmpl_789"
      choices:
        - index: 0
          delta: {}
          finish_reason: "stop"
      usage:
        prompt_tokens: 10
        completion_tokens: 0
        total_tokens: 10

    preconditions:
      - "this.chatCompletionTextContent.length === 0"
      - "this.chatCompletionToolCalls.size === 0"

    output:
      immediate_event:
        type: "Completed"
        description: "Skip OutputItemDone, emit Completed directly"

      state_changes:
        - "this.chatCompletionTextContent = ''"
        - "this.chatCompletionToolCalls.clear()"

    rationale: "Rare but valid (e.g., model refuses to respond or empty response)"

    code_location: "lines 449-455 (new)"

  text_and_tool_calls_both_present:
    description: "Both text and tool calls accumulated when finish_reason arrives"

    input_example:
      id: "chatcmpl_mixed"
      choices:
        - index: 0
          delta: {}
          finish_reason: "tool_calls"
      usage:
        prompt_tokens: 20
        completion_tokens: 15
        total_tokens: 35

    preconditions:
      - "this.chatCompletionTextContent.length > 0"
      - "this.chatCompletionToolCalls.size > 0"
      - "finish_reason === 'tool_calls'"

    output:
      behavior: "Tool calls take precedence, text is discarded"

      immediate_event:
        type: "OutputItemDone"
        item_type: "function_call"

      state_changes:
        - "Clear BOTH chatCompletionTextContent and chatCompletionToolCalls"

      rationale: "Mimics OpenAI behavior (tool calls override text)"

    code_location: "lines 393 (new), 722"

  multiple_tool_calls:
    description: "More than one tool call accumulated"

    preconditions:
      - "this.chatCompletionToolCalls.size > 1"
      - "finish_reason === 'tool_calls'"

    output:
      behavior: "Emit first tool call only"

      warning: "Log warning about multiple tool calls being discarded"

      immediate_event:
        type: "OutputItemDone"
        item: "First tool call (index 0)"

      discarded: "All other tool calls"

    rationale: "Current architecture supports single tool call per turn"

    code_location: "lines 725-727"

  invalid_json_arguments:
    description: "Tool call arguments is not valid JSON"

    input_example:
      accumulated_tool_call:
        id: "call_bad"
        function:
          name: "search"
          arguments: '{"query": incomplete'

    output:
      behavior: "Emit function_call item anyway"

      warning: "Log error about invalid JSON"

      handling: "TurnManager will catch error during JSON.parse"

    rationale: "Don't silently drop tool calls; let caller handle errors"

    validation_location: "data-model.md (Rule 2)"

  stream_ends_prematurely:
    description: "Stream ends without finish_reason"

    state_at_end:
      - "this.chatCompletionTextContent may have accumulated text"
      - "this.chatCompletionToolCalls may have partial tool calls"
      - "this.pendingEvents may be non-empty"

    output:
      behavior: "TurnManager throws error (line 269)"

      error_message: "Stream closed without Completed event"

    cleanup: "State is reset at next stream start"

    code_location: "/home/irichard/dev/git_repos/open_source/browserx/s4/browserx/src/core/TurnManager.ts:269"

  pending_events_not_flushed:
    description: "Stream ends with events still in pendingEvents queue"

    cause: "Completed queued after OutputItemDone but stream ended"

    solution: "Stream end flush mechanism"

    code_location: "lines 518-521, 552-555"

    logic: |
      // After stream iteration completes:
      while (this.pendingEvents.length > 0) {
        yield this.pendingEvents.shift()!;
      }

    validation: "Ensure Completed event always reaches TurnManager"

# ==============================================================================
# SECTION 6: State Management and Reset
# ==============================================================================

state_management:
  initialization:
    timing: "On OpenAIResponsesClient instantiation"

    variables:
      - name: "chatCompletionTextContent"
        initial_value: '""'

      - name: "chatCompletionToolCalls"
        initial_value: "new Map()"

      - name: "pendingEvents"
        initial_value: "[]"

  reset_on_stream_start:
    timing: "Before processing first chunk of new stream"

    locations:
      - "processSDKStream (after line 505)"
      - "makeChatCompletionsRequest (after line 1112)"

    actions:
      - "this.chatCompletionTextContent = ''"
      - "this.chatCompletionToolCalls.clear()"
      - "this.pendingEvents = []"

    rationale: "Prevent state leakage between consecutive requests"

  reset_on_emission:
    timing: "After emitting OutputItemDone (before queuing Completed)"

    location: "In finish_reason handling (lines 422-455 new, 716-748)"

    actions:
      - "this.chatCompletionTextContent = ''"
      - "this.chatCompletionToolCalls.clear()"

    rationale: "State consumed to create item, no longer needed"

  defensive_reset:
    timing: "At stream end (after flushing pending events)"

    location: "After lines 518-521, 552-555"

    actions:
      - "if (this.chatCompletionTextContent.length > 0) { warn and clear }"
      - "if (this.chatCompletionToolCalls.size > 0) { warn and clear }"
      - "if (this.pendingEvents.length > 0) { warn and flush }"

    rationale: "Catch bugs where state wasn't properly cleared"

