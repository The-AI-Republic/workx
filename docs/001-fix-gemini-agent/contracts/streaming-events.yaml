completion_tool_call_contract:
  description: |
    Handles completion of tool call responses.

    When finish_reason === 'tool_calls', convert accumulated tool calls
    to function_call item, emit OutputItemDone, then queue Completed.

  input:
    type: "ChatCompletionChunk"
    schema:
      id:
        type: "string"
        example: "chatcmpl_456"

      choices:
        type: "array"
        items:
          type: "object"
          properties:
            delta:
              type: "object"
              description: "Usually empty for completion chunk"
              properties: {}

            finish_reason:
              type: "string"
              enum: ["tool_calls"]
              description: "Indicates tool call completion"

      usage:
        type: "object"
        properties:
          prompt_tokens: { type: "number" }
          completion_tokens: { type: "number" }
          total_tokens: { type: "number" }

    example:
      id: "chatcmpl_456"
      choices:
        - index: 0
          delta: {}
          finish_reason: "tool_calls"
      usage:
        prompt_tokens: 15
        completion_tokens: 20
        total_tokens: 35

  preconditions:
    - condition: "finish_reason === 'tool_calls'"
      description: "Completion reason indicates tool call"

    - condition: "this.chatCompletionToolCalls.size > 0"
      description: "At least one tool call accumulated"

  output:
    immediate_event:
      type: "OutputItemDone"
      schema:
        type:
          const: "OutputItemDone"
        item:
          type: "ResponseItem (function_call)"
          properties:
            type:
              const: "function_call"
            id:
              type: "string"
              description: "Tool call ID from accumulated data"
            name:
              type: "string"
              description: "Function name from accumulated data"
            arguments:
              type: "string"
              description: "Complete JSON arguments from accumulated data"

      example:
        type: "OutputItemDone"
        item:
          type: "function_call"
          id: "call_abc123"
          name: "web_search"
          arguments: '{"query": "test"}'

    queued_event:
      type: "Completed"
      schema:
        type:
          const: "Completed"
        responseId:
          type: "string"
        tokenUsage:
          type: "object"

      queue: "this.pendingEvents"
      emission_timing: "Next iteration or stream end flush"

    state_changes:
      - variable: "this.chatCompletionToolCalls"
        action: "Clear map"
        timing: "After creating function_call item"

      - variable: "this.chatCompletionTextContent"
        action: "Reset to empty string"
        timing: "After creating function_call item"
        rationale: "Discard any text that accompanied tool call"

  conversion_rules:
    - rule: "Convert tool calls map to array"
      code_location: "line 720"
      logic: "const toolCallsArray = Array.from(this.chatCompletionToolCalls.values());"

    - rule: "Emit first tool call only (current limitation)"
      code_location: "lines 724-748"
      logic: |
        const toolCall = toolCallsArray[0];

        if (toolCallsArray.length > 1) {
          console.warn('Multiple tool calls, emitting first only');
        }

    - rule: "Create function_call item"
      code_location: "lines 736-744"
      logic: |
        const item: ResponseItem = {
          type: 'function_call',
          id: toolCall.id,
          name: toolCall.function.name,
          arguments: toolCall.function.arguments,
        };

    - rule: "Queue Completed for next iteration"
      code_location: "line 733"
      logic: "this.pendingEvents.push(completedEvent);"

    - rule: "Clear both accumulators"
      code_location: "lines 722, 393 (new)"
      logic: |
        this.chatCompletionToolCalls.clear();
        this.chatCompletionTextContent = '';  // NEW: Also clear text

    - rule: "Return OutputItemDone immediately"
      code_location: "lines 736-744"

  error_handling:
    - condition: "chatCompletionToolCalls is empty"
      action: "Log warning, emit Completed without OutputItemDone"
      code_location: "lines 726-728"

    - condition: "Multiple tool calls accumulated"
      action: "Log warning, emit first tool call only"
      code_location: "lines 725-727"

    - condition: "Tool call missing function.name"
      action: "Log error, emit Completed without OutputItemDone"

    - condition: "Tool call arguments is invalid JSON"
      action: "Log error but still emit (TurnManager will handle error)"

  event_sequence:
    description: "Order of events emitted to TurnManager"
    sequence:
      - event: "OutputItemDone"
        timing: "Immediate return from convertChatCompletionEventToResponseEvent"
        contains: "Function call item with complete arguments"

      - event: "Completed"
        timing: "Next iteration (from pendingEvents queue)"
        contains: "Response ID and token usage"

