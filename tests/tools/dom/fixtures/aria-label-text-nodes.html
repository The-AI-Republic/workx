<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Aria-Label Text Nodes Test Fixture</title>
</head>
<body>
  <!-- Test Case 1: Text nodes with duplicate aria-labels (typical X.com pattern) -->
  <div id="test-case-1">
    <div aria-label="Post content">
      What's happening?
    </div>
  </div>

  <!-- Test Case 2: Nested text nodes with aria-labels -->
  <div id="test-case-2">
    <p aria-label="Paragraph text">
      This is a paragraph with text nodes that have aria-labels.
    </p>
  </div>

  <!-- Test Case 3: Text nodes inside interactive elements -->
  <div id="test-case-3">
    <button aria-label="Submit button">
      Submit
    </button>
  </div>

  <!-- Test Case 4: Multiple text nodes in same container -->
  <div id="test-case-4">
    <div aria-label="Container with multiple text nodes">
      First text node
      Second text node
      Third text node
    </div>
  </div>

  <!-- Test Case 5: Text nodes with StaticText role (CDP pattern) -->
  <div id="test-case-5">
    <span role="none">
      Text with role annotation
    </span>
  </div>

  <!-- Test Case 6: Empty text nodes with aria-labels -->
  <div id="test-case-6">
    <div aria-label="Empty content">

    </div>
  </div>

  <!-- Test Case 7: Text nodes in links with aria-labels -->
  <div id="test-case-7">
    <a href="/profile" aria-label="User profile link">
      @username
    </a>
  </div>

  <!-- Test Case 8: Mixed element and text nodes -->
  <div id="test-case-8">
    <div aria-label="Mixed content container">
      Text before
      <span>Span element</span>
      Text after
    </div>
  </div>

  <!-- Test Case 9: Text nodes in form elements -->
  <div id="test-case-9">
    <label aria-label="Email input label">
      Email address
    </label>
  </div>

  <!-- Test Case 10: Text nodes with special characters -->
  <div id="test-case-10">
    <div aria-label="Special characters: <>&quot;'">
      Special characters: <>&"'
    </div>
  </div>
</body>
</html>
