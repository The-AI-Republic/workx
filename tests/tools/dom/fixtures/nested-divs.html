<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Nested Divs Test Fixture - X.com Pattern</title>
</head>
<body>
  <!-- Test Case 1: 7 nested meaningless divs (should reduce to 2 levels) -->
  <div id="test-case-1">
    <div role="generic">
      <div>
        <div role="generic">
          <div>
            <div role="generic">
              <div>
                <button id="submit-button" role="button">Submit Post</button>
              </div>
            </div>
          </div>
        </div>
      </div>
    </div>
  </div>

  <!-- Test Case 2: Nested divs with semantic container (should preserve form) -->
  <div id="test-case-2">
    <div>
      <div>
        <form id="login-form">
          <div>
            <input type="text" id="username" placeholder="Username">
          </div>
        </form>
      </div>
    </div>
  </div>

  <!-- Test Case 3: Nested divs with meaningful attributes (should preserve id div) -->
  <div id="test-case-3">
    <div>
      <div>
        <div id="important-container" data-testid="main-content">
          <p>Important content</p>
        </div>
      </div>
    </div>
  </div>

  <!-- Test Case 4: Mixed nesting (meaningless + semantic) -->
  <div id="test-case-4">
    <nav role="navigation">
      <div>
        <div role="generic">
          <div>
            <a href="/home" role="link">Home</a>
          </div>
        </div>
      </div>
    </nav>
  </div>

  <!-- Test Case 5: 10 nested divs with multiple children at end (should hoist to meaningful level) -->
  <div id="test-case-5">
    <div>
      <div role="generic">
        <div>
          <div>
            <div role="generic">
              <div>
                <div>
                  <div>
                    <div>
                      <div id="content-wrapper">
                        <button>Action 1</button>
                        <button>Action 2</button>
                      </div>
                    </div>
                  </div>
                </div>
              </div>
            </div>
          </div>
        </div>
      </div>
    </div>
  </div>

  <!-- Test Case 6: Nested divs with aria-label (should preserve) -->
  <div id="test-case-6">
    <div>
      <div>
        <div aria-label="Post actions">
          <button>Like</button>
          <button>Share</button>
        </div>
      </div>
    </div>
  </div>

  <!-- Test Case 7: Single child chain breaking on semantic role -->
  <div id="test-case-7">
    <div>
      <div>
        <div>
          <div role="region">
            <p>Region content</p>
          </div>
        </div>
      </div>
    </div>
  </div>
</body>
</html>
